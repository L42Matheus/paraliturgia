<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Inscrições Paraliturgia</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .admin-topo {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .stats {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .stat {
      background: #fdfbf5;
      border: 1px solid var(--borda);
      border-radius: 10px;
      padding: 12px 16px;
      min-width: 130px;
      text-align: center;
    }
    .stat .num {
      display: block;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--azul-escuro);
    }
    .stat .rot {
      font-size: 0.8rem;
      color: var(--texto-suave);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .dashboard {
      display: grid;
      grid-template-columns: minmax(200px, 240px) 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }
    @media (max-width: 640px) {
      .dashboard { grid-template-columns: 1fr; }
    }
    .card-total {
      background: linear-gradient(135deg, var(--azul-escuro) 0%, var(--azul-medio) 100%);
      color: var(--branco);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      box-shadow: 0 6px 18px rgba(27, 42, 78, 0.18);
    }
    .card-total .num {
      font-size: 3rem;
      font-weight: 800;
      line-height: 1;
      color: var(--branco);
    }
    .card-total .rot {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #dcd3bd;
      margin-top: 4px;
    }
    .card-chart {
      background: #fdfbf5;
      border: 1px solid var(--borda);
      border-radius: 12px;
      padding: 16px 20px;
    }
    .card-chart h4 {
      margin: 0 0 12px;
      color: var(--azul-escuro);
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .bar-row {
      display: grid;
      grid-template-columns: 44px 1fr 40px;
      gap: 10px;
      align-items: center;
      margin-bottom: 8px;
    }
    .bar-row:last-child { margin-bottom: 0; }
    .bar-lbl {
      font-weight: 700;
      color: var(--azul-escuro);
      font-size: 0.9rem;
    }
    .bar-track {
      background: #eef2fb;
      height: 18px;
      border-radius: 9px;
      overflow: hidden;
    }
    .bar-fill {
      background: linear-gradient(90deg, var(--dourado), #d4b56a);
      height: 100%;
      border-radius: 9px;
      transition: width 0.4s ease;
      min-width: 2px;
    }
    .bar-count {
      color: var(--texto-suave);
      font-weight: 600;
      font-size: 0.9rem;
      text-align: right;
    }
    .card-resumo {
      background: #fdfbf5;
      border: 1px solid var(--borda);
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      align-items: center;
      color: var(--texto);
      font-size: 0.95rem;
    }
    .card-resumo strong {
      color: var(--azul-escuro);
      font-weight: 700;
    }
    .card-resumo .sep {
      color: var(--dourado);
      font-weight: 700;
    }
    .tabela-wrap {
      overflow-x: auto;
      border: 1px solid var(--borda);
      border-radius: 10px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--branco);
      font-size: 0.92rem;
    }
    th, td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid var(--borda);
      vertical-align: top;
    }
    th {
      background: #eef2fb;
      color: var(--azul-escuro);
      position: sticky;
      top: 0;
    }
    tr:last-child td { border-bottom: none; }
    .tag {
      display: inline-block;
      background: #eef2fb;
      color: var(--azul-escuro);
      border: 1px solid #cfd8ee;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.8rem;
      margin-right: 4px;
    }
    .grupos {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .grupo {
      background: #fdfbf5;
      border: 1px solid var(--borda);
      border-radius: 10px;
      padding: 14px;
    }
    .grupo h3 {
      margin: 0 0 8px;
      color: var(--azul-escuro);
      font-size: 1rem;
    }
    .grupo ul { margin: 0; padding-left: 18px; color: var(--texto-suave); font-size: 0.9rem; }
    .grupo .contador { color: var(--dourado); font-weight: 700; }
    .btn-export {
      background: var(--dourado);
      color: var(--azul-escuro);
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .btn-export:hover { filter: brightness(0.95); }
    .vazio {
      text-align: center;
      padding: 40px 20px;
      color: var(--texto-suave);
    }
    .motivo-cell {
      max-width: 320px;
      white-space: pre-wrap;
      color: var(--texto-suave);
      font-size: 0.9rem;
    }
    .btn-det {
      background: transparent;
      border: 1px solid var(--azul-medio);
      color: var(--azul-medio);
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .btn-det:hover { background: #eef2fb; }
    .detalhes-row td {
      background: #fdfbf5;
      padding: 16px;
    }
    .detalhes-row.hidden { display: none; }
    .detalhes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px 20px;
    }
    .detalhes-grid dt {
      font-size: 0.75rem;
      text-transform: uppercase;
      color: var(--texto-suave);
      letter-spacing: 0.05em;
      margin-bottom: 2px;
    }
    .detalhes-grid dd {
      margin: 0 0 8px;
      color: var(--texto);
      font-size: 0.95rem;
      white-space: pre-wrap;
    }
    .detalhes-grid .full { grid-column: 1 / -1; }
  </style>
</head>
<body>
  <header class="hero" style="padding: 40px 24px;">
    <img src="/logo.png" alt="Pastoral da Paraliturgia" class="logo logo-sm" onerror="this.style.display='none'" />
    <span class="badge">Painel administrativo</span>
    <h1 style="font-size: clamp(1.6rem, 4vw, 2.2rem);">Inscrições — Que Seja Você</h1>
  </header>

  <main class="container">
    <section class="card">
      <div class="admin-topo">
        <h2 style="margin:0;">Dashboard</h2>
        <a class="btn-export" href="/api/inscricoes.csv">Exportar CSV</a>
      </div>

      <div class="dashboard" id="dashboard"></div>
      <div class="card-resumo" id="resumo" hidden></div>

      <h2>Por domingo</h2>
      <div class="grupos" id="grupos"></div>

      <h2>Todas as inscrições</h2>
      <div class="tabela-wrap">
        <table id="tabela">
          <thead>
            <tr>
              <th>#</th>
              <th>Nome</th>
              <th>Telefone</th>
              <th>Bairro</th>
              <th>Domingos</th>
              <th>Enviado em</th>
              <th></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    function escapeHtml(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function formatarData(iso) {
      if (!iso) return '';
      const d = new Date(iso.includes('T') ? iso : iso.replace(' ', 'T') + 'Z');
      if (isNaN(d)) return iso;
      return d.toLocaleString('pt-BR', { dateStyle: 'short', timeStyle: 'short' });
    }

    function formatarNasc(iso) {
      if (!iso || !/^\d{4}-\d{2}-\d{2}$/.test(iso)) return iso || '';
      const [a, m, d] = iso.split('-');
      return `${d}/${m}/${a}`;
    }

    async function carregar() {
      const resp = await fetch('/api/inscricoes');
      if (!resp.ok) {
        document.body.innerHTML = '<p style="padding:40px;text-align:center;">Erro ao carregar. Faça login novamente.</p>';
        return;
      }
      const { inscricoes } = await resp.json();

      const contagem = { 1: [], 2: [], 3: [], 4: [] };
      inscricoes.forEach((i) => {
        contagem[i.domingo_1]?.push(i.nome);
        contagem[i.domingo_2]?.push(i.nome);
      });

      const total = inscricoes.length;
      const maxDomingo = Math.max(1, ...[1,2,3,4].map((n) => contagem[n].length));
      const dashboardEl = document.getElementById('dashboard');
      dashboardEl.innerHTML = `
        <div class="card-total">
          <span class="num">${total}</span>
          <span class="rot">${total === 1 ? 'Inscrito' : 'Inscritos'}</span>
        </div>
        <div class="card-chart">
          <h4>Distribuição por domingo</h4>
          ${[1,2,3,4].map((n) => {
            const c = contagem[n].length;
            const pct = Math.round((c / maxDomingo) * 100);
            return `
              <div class="bar-row">
                <span class="bar-lbl">${n}º dom.</span>
                <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
                <span class="bar-count">${c}</span>
              </div>
            `;
          }).join('')}
        </div>
      `;

      const resumoEl = document.getElementById('resumo');
      if (total > 0) {
        const soma = (campo) => inscricoes.reduce((acc, i) => acc + (i[campo] === 1 ? 1 : 0), 0);
        const batizados = soma('batizado');
        const comunhao = soma('fez_primeira_comunhao');
        const ejc = soma('fez_ejc');
        const crisma = soma('fez_crisma');
        const outraPastoral = soma('outra_pastoral');
        const partes = [
          `<span><strong>${total}</strong> ${total === 1 ? 'inscrito' : 'inscritos'}</span>`,
          `<span><strong>${batizados}</strong> ${batizados === 1 ? 'batizado' : 'batizados'}</span>`,
          `<span><strong>${comunhao}</strong> ${comunhao === 1 ? 'fez' : 'fizeram'} a 1ª comunhão</span>`,
          `<span><strong>${ejc}</strong> ${ejc === 1 ? 'fez' : 'fizeram'} EJC</span>`,
          `<span><strong>${crisma}</strong> ${crisma === 1 ? 'fez' : 'fizeram'} crisma</span>`,
          `<span><strong>${outraPastoral}</strong> ${outraPastoral === 1 ? 'participa' : 'participam'} de outra pastoral</span>`,
        ];
        resumoEl.innerHTML = partes.join('<span class="sep">•</span>');
        resumoEl.hidden = false;
      } else {
        resumoEl.hidden = true;
      }

      const gruposEl = document.getElementById('grupos');
      gruposEl.innerHTML = [1, 2, 3, 4].map((n) => `
        <div class="grupo">
          <h3>${n}º domingo <span class="contador">(${contagem[n].length})</span></h3>
          ${contagem[n].length
            ? '<ul>' + contagem[n].map((nome) => `<li>${escapeHtml(nome)}</li>`).join('') + '</ul>'
            : '<p style="margin:0;color:var(--texto-suave);font-size:0.9rem;">Ninguém ainda.</p>'}
        </div>
      `).join('');

      const tbody = document.querySelector('#tabela tbody');
      if (inscricoes.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="vazio">Nenhuma inscrição ainda.</td></tr>';
        return;
      }

      const simNao = (v) => (v === 1 ? 'Sim' : 'Não');
      const linha = (i) => `
        <tr>
          <td>${i.id}</td>
          <td>${escapeHtml(i.nome)}</td>
          <td>${escapeHtml(i.telefone)}</td>
          <td>${escapeHtml(i.bairro || '—')}</td>
          <td>
            <span class="tag">${i.domingo_1}º</span>
            <span class="tag">${i.domingo_2}º</span>
          </td>
          <td>${formatarData(i.criado_em)}</td>
          <td><button class="btn-det" data-id="${i.id}">Detalhes</button></td>
        </tr>
        <tr class="detalhes-row hidden" id="det-${i.id}">
          <td colspan="7">
            <dl class="detalhes-grid">
              <div><dt>E-mail</dt><dd>${escapeHtml(i.email)}</dd></div>
              <div><dt>Nascimento</dt><dd>${formatarNasc(i.data_nascimento)}</dd></div>
              <div><dt>Estado civil</dt><dd>${escapeHtml(i.estado_civil || '—')}</dd></div>
              <div><dt>Batizado</dt><dd>${simNao(i.batizado)}</dd></div>
              <div><dt>Primeira comunhão</dt><dd>${simNao(i.fez_primeira_comunhao)}${i.fez_primeira_comunhao === 1 && i.primeira_comunhao ? ' — ' + escapeHtml(i.primeira_comunhao) : ''}</dd></div>
              <div><dt>EJC</dt><dd>${simNao(i.fez_ejc)}${i.fez_ejc === 1 && i.ejc_local ? ' — ' + escapeHtml(i.ejc_local) : ''}</dd></div>
              <div><dt>Crisma</dt><dd>${simNao(i.fez_crisma)}${i.fez_crisma === 1 && i.crisma_local ? ' — ' + escapeHtml(i.crisma_local) : ''}</dd></div>
              <div><dt>Outra pastoral</dt><dd>${simNao(i.outra_pastoral)}${i.outra_pastoral === 1 && i.outra_pastoral_qual ? ' — ' + escapeHtml(i.outra_pastoral_qual) : ''}</dd></div>
              <div><dt>Ciente do compromisso</dt><dd>${simNao(i.ciente_compromisso)}</dd></div>
              <div class="full"><dt>Motivo</dt><dd>${escapeHtml(i.motivo || '—')}</dd></div>
              ${i.observacoes ? `<div class="full"><dt>Observações</dt><dd>${escapeHtml(i.observacoes)}</dd></div>` : ''}
            </dl>
          </td>
        </tr>
      `;
      tbody.innerHTML = inscricoes.map(linha).join('');

      tbody.addEventListener('click', (ev) => {
        const btn = ev.target.closest('.btn-det');
        if (!btn) return;
        const alvo = document.getElementById('det-' + btn.dataset.id);
        if (!alvo) return;
        const aberto = !alvo.classList.contains('hidden');
        alvo.classList.toggle('hidden');
        btn.textContent = aberto ? 'Detalhes' : 'Fechar';
      });
    }

    carregar();
  </script>
</body>
</html>
